/* Fungsi untuk merender teks AI menjadi HTML cantik */
const renderMarkdown = (text) => {
  if (!text) return null;
  return text.split('\n').map((line, index) => {
    let content = line.trim();
    let isBullet = content.startsWith('* ') || content.startsWith('- ') || content.startsWith('• ');
    
    if (isBullet) content = content.substring(2);
    if (content === '') return <div key={index} className="h-2"></div>;

    // Pisahkan text yang bold (mengandung **)
    const parts = content.split(/(\*\*.*?\*\*)/g).map((part, i) => {
      if (part.startsWith('**') && part.endsWith('**')) {
        return <strong key={i} className="font-extrabold text-indigo-900">{part.slice(2, -2)}</strong>;
      }
      return part;
    });

    // Desain untuk bullet points
    if (isBullet) {
      return (
        <div key={index} className="flex items-start gap-2 mb-1.5 ml-1">
          <span className="text-indigo-500 font-bold mt-0.5">•</span>
          <span className="text-slate-700">{parts}</span>
        </div>
      );
    }

    // Desain untuk paragraf biasa
    return <p key={index} className="mb-2 text-slate-700">{parts}</p>;
  });
};

/* Dynamic slider component */
function DimSlider({ label, question, low, high, val, setVal, type = 'default' }) {
  const getContainerClass = () => {
    if (type === 'workload') {
      if (val <= 2) return 'sval-bad';
      if (val === 3) return 'sval-ok';
      return 'sval-amber';
    }
    if (val <= 2) return 'sval-bad';
    if (val >= 4) return 'sval-good';
    return 'sval-ok';
  };
  const getSliderClass = () => {
    if (type === 'workload') { return val <= 2 ? 'slider slider-red' : val >= 4 ? 'slider slider-amber' : 'slider'; }
    if (val <= 2) return 'slider slider-red';
    if (val >= 4) return 'slider slider-green';
    return 'slider';
  };
  const getDotColor = () => {
    if (type === 'workload') { if (val<=2) return '#ef4444'; if (val>=4) return '#f59e0b'; return '#6366f1'; }
    if (val <= 2) return '#ef4444'; if (val >= 4) return '#10b981'; return '#6366f1';
  };
  return (
    <div className={`slider-container border rounded-xl p-3 ${getContainerClass()}`}>
      <div className="flex justify-between items-center mb-0.5">
        <span className="font-semibold text-sm text-slate-800">{label}</span>
        <span className="mono font-bold text-sm px-1.5 py-0 rounded-md" style={{color:getDotColor(),background:`${getDotColor()}18`}}>{val}/5</span>
      </div>
      <p className="text-[11px] text-slate-500 italic mb-2 leading-snug">"{question}"</p>
      <input type="range" min="1" max="5" step="1" value={val} onChange={e => setVal(parseInt(e.target.value))} className={getSliderClass()} />
      <div className="flex justify-between text-[10px] text-slate-400 mt-0.5">
        <span>{low}</span><span>{high}</span>
      </div>
    </div>
  );
}

 // History & trend
  const [history, setHistory] = useState([]);

  // State baru untuk Gemini API Key
  const [apiKey, setApiKey] = useState('');

  useEffect(() => {
    // Load history
    const stored = localStorage.getItem('lc_v3');
    if (stored) try { setHistory(JSON.parse(stored)); } catch(e){}
    
    // Load API Key jika sebelumnya sudah pernah dimasukkan
    const storedKey = localStorage.getItem('lc_v3_gemini_key');
    if (storedKey) setApiKey(storedKey);
  }, []);

  const handleKeyChange = (e) => {

    setApiKey(val);

  };

  const saveHistory = h => { localStorage.setItem('lc_v3', JSON.stringify(h)); setHistory(h); };

  /* ── COMPUTED SCORES ── */
  const coreAvg = (variety + identity + significance) / 3;
  const mps = parseFloat((coreAvg * autonomy * feedback).toFixed(1)); // 0–125

  // JD-R: workload demand (U-shaped: both extremes = high demand)
  const workloadDemand = workload <= 3 ? (6 - workload) : (workload - 1);
  // resources avg (six dimensions)
  const resourcesAvg = (autonomy + support + feedback + roleClarity + psychSafety + growth) / 6;
  const jdrBalance = parseFloat((resourcesAvg - workloadDemand).toFixed(2));

  // Engagement index 0–100 (Schaufeli et al., 2002 – UWES approximation)
  const engagementIndex = Math.round(
    (mps/125) * 35 +
    (growth/5) * 25 +
    (psychSafety/5) * 22 +
    (roleClarity/5) * 18
  );

  // Burnout risk 0–100 (Maslach Burnout Inventory dimensions approximation)
  const burnoutRisk = Math.round(
    (workloadDemand/5) * 40 +
    ((5-support)/5) * 30 +
    ((5-psychSafety)/5) * 30
  );

  /* ── DIAGNOSIS ── */
  let activeDiagnosis = 'ideal';
  if      (workload<=2 && support<=2)          activeDiagnosis = 'severe_burnout';
  else if (psychSafety<=2)                     activeDiagnosis = 'psych_danger';
  else if (workload<=2)                        activeDiagnosis = 'supported_strain';
  else if (roleClarity<=2)                     activeDiagnosis = 'role_ambiguity';
  else if (workload>=4 && variety<=2 && mps<30)activeDiagnosis = 'boreout';
  else if (feedback<=2)                        activeDiagnosis = 'feedback';
  else if (growth<=2 && autonomy>=3)           activeDiagnosis = 'growth_stagnation';
  else if (autonomy<=2||identity<=2||significance<=2) activeDiagnosis = 'enrichment';
  else if (variety<=2)                         activeDiagnosis = 'enlargement';

  // Secondary flags (additional warnings even if not primary)
  const secondaryFlags = [];
  if (activeDiagnosis !== 'psych_danger'    && psychSafety <= 2) secondaryFlags.push('⚠️ Psych Safety rendah');
  if (activeDiagnosis !== 'role_ambiguity'  && roleClarity <= 2) secondaryFlags.push('⚠️ Role ambiguity tinggi');
  if (activeDiagnosis !== 'feedback'        && feedback <= 2)    secondaryFlags.push('⚠️ Feedback minim');
  if (activeDiagnosis !== 'growth_stagnation'&&growth <= 2)      secondaryFlags.push('⚠️ Growth stagnan');

  const requiresActionPlan = activeDiagnosis !== 'ideal';

  const diagInfo = t.diagnoses[activeDiagnosis];
  const diagColorMap = { red:'diag-red', amber:'diag-amber', indigo:'diag-indigo', green:'diag-green', rose:'diag-rose' };

    };

          <td>${escapeHTML(t.diagnoses[row.diagnosis]?.title || row.diagnosis)}</td>
          <td>${escapeHTML(row.newTask)}</td>
          <td>${escapeHTML(row.recognition)}</td>
          <td>${escapeHTML(row.notes)}</td>
          <td>${escapeHTML(row.aiAnalysis || 'Belum ada analisis AI')}</td>
        </tr>
      `;
    });

    tableHTML += `</tbody></table></body></html>`;

    // Proses download file .xls
    const blob = new Blob([tableHTML], { type: 'application/vnd.ms-excel' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `Leaders_Compass_Export_${Date.now()}.xls`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({version:'3.0',exportDate:new Date().toISOString(),history},null,2)],{type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `leaders_compass_v3_${Date.now()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  const importJSON = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.history) throw new Error();
        saveHistory(Array.isArray(data.history)?data.history:[]);
        alert(lang==='id'?'Data berhasil dimuat!':'Data loaded!');
      } catch { alert(lang==='id'?'File JSON tidak valid':'Invalid JSON file'); }
      if(fileRef.current) fileRef.current.value='';
    };
    reader.readAsText(file);
  };

  const diagEmoji = d => ({ideal:'✅',severe_burnout:'🚨',psych_danger:'🔴',supported_strain:'🛡️',role_ambiguity:'⚠️',boreout:'🥱',feedback:'🔄',growth_stagnation:'📈',enrichment:'⬆️',enlargement:'↔️'})[d]||'—';

  // Unique names in history for trend selector
  const uniqueNames = [...new Set(history.map(e=>e.name))];
  const trendEntries = trendName ? history.filter(e=>e.name===trendName).slice().reverse() : [];

  const radarData = [variety,autonomy,identity,significance,feedback,workload,support,roleClarity,psychSafety,growth];

  return (
    <div className="max-w-7xl mx-auto px-4 py-6 md:py-8">

{/* ── HEADER ── */}
      <div className="flex flex-wrap justify-between items-start gap-4 mb-6">
        <div>
          <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight">{t.appTitle}</h1>
          <p className="text-xs font-semibold text-indigo-500 tracking-wider uppercase mt-0.5">{t.appVersion}</p>
          <p className="text-sm text-slate-500 mt-0.5">{t.appSubtitle}</p>
        </div>
        <div className="flex flex-col gap-2 items-end">
          <div className="flex flex-wrap gap-2 items-center">
            <button onClick={exportJSON} className="bg-white border border-slate-200 rounded-full px-3 py-1.5 text-xs font-semibold text-slate-600 hover:bg-indigo-50 shadow-sm">{t.btnExport}</button>
            <button onClick={()=>fileRef.current.click()} className="bg-white border border-slate-200 rounded-full px-3 py-1.5 text-xs font-semibold text-slate-600 hover:bg-indigo-50 shadow-sm">{t.btnImport}</button>
            <input type="file" ref={fileRef} accept=".json" onChange={importJSON} style={{display:'none'}} />
            <button onClick={()=>setLang(l=>l==='id'?'en':'id')} className="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full px-4 py-1.5 text-xs font-bold shadow-sm">{t.langToggle}</button>
          </div>
          {/* Form Input BYOK Gemini */}
          <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-full px-3 py-1.5 shadow-sm mt-1">
            <span className="text-[10px] font-bold text-slate-500">🔑 GEMINI KEY:</span>
            <input
              type="password"
              value={apiKey}
              onChange={handleKeyChange}
              placeholder="Paste API Key..."
              className="text-xs outline-none bg-transparent w-32 focus:w-48 transition-all duration-300 text-slate-700"
            />
          </div>
        </div>
      </div>

      {/* ── INTRO BANNER ── */}
      <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-4 mb-4 text-sm text-indigo-800">{t.introText}</div>

      {/* ── ETHICS WARNING ── */}
      <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-8 rounded-r-xl">
        <div className="flex gap-2 items-start"><WarningIcon/><div>
          <p className="font-bold text-amber-900 text-sm">{t.warningTitle}</p>
          <ul className="mt-1 space-y-0.5 text-xs text-amber-800 list-disc pl-4">
            <li>{t.rule1}</li><li>{t.rule2}</li><li>{t.rule3}</li>
          </ul>
        </div></div>
      </div>

      {/* ── MAIN GRID ── */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">

        {/* ── LEFT: INPUT PANEL ── */}
        <div className="lg:col-span-2 space-y-5">


            {/* Name & Sample Data */}
          <div className="glass p-5">
            <div className="flex justify-between items-center mb-3">
              <h2 className="text-base font-bold text-slate-800">{t.sectionInput}</h2>
              <button onClick={loadSampleJohnSmith} className="flex items-center gap-1 text-[11px] font-bold text-indigo-700 bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-full hover:bg-indigo-100 hover:scale-105 transition-all shadow-sm">
                <SparkleIcon /> Load Sample: John Smith
              </button>
            </div>
            
            <label className="text-sm font-semibold text-slate-700 block mb-1">{t.memberName}</label>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder={t.namePlaceholder}
              className="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            <p className="text-[11px] text-slate-400 mt-2 italic">*Klik tombol Load Sample di atas untuk melihat contoh kasus karyawan yang membutuhkan Job Enrichment.</p>
          </div>

          {/* JCM Section */}
          <div className="glass p-5">
            <div className="flex items-center gap-2 mb-1">
              <span className="badge-jcm">{t.labelJCM}</span>
            </div>
            <p className="text-xs text-slate-500 mb-4">{t.jcmDesc}<br/><span className="text-slate-400">{t.section1Desc}</span></p>
            <div className="grid md:grid-cols-2 gap-3">
              <DimSlider label={t.dimVariety}     question={t.qVariety}     low={t.lblVLow}   high={t.lblVHigh}   val={variety}      setVal={setVariety} />
              <DimSlider label={t.dimAutonomy}    question={t.qAutonomy}    low={t.lblALow}   high={t.lblAHigh}   val={autonomy}     setVal={setAutonomy} />
              <DimSlider label={t.dimIdentity}    question={t.qIdentity}    low={t.lblILow}   high={t.lblIHigh}   val={identity}     setVal={setIdentity} />
              <DimSlider label={t.dimSignificance}question={t.qSignificance}low={t.lblSLow}   high={t.lblSHigh}   val={significance} setVal={setSignificance} />
              <div className="md:col-span-2">
                <DimSlider label={t.dimFeedback}  question={t.qFeedback}    low={t.lblFLow}   high={t.lblFHigh}   val={feedback}     setVal={setFeedback} />
              </div>
            </div>
          </div>

          {/* JD-R Section */}
          <div className="glass p-5">
            <div className="flex items-center gap-2 mb-1">
              <span className="badge-jdr">{t.labelJDR}</span>
            </div>
            <p className="text-xs text-slate-500 mb-4">{t.jdrDesc}</p>
            <div className="grid md:grid-cols-2 gap-3">
              <DimSlider label={t.dimWorkload}    question={t.qWorkload}    low={t.lblWLow}   high={t.lblWHigh}   val={workload}     setVal={setWorkload}   type="workload" />
              <DimSlider label={t.dimSupport}     question={t.qSupport}     low={t.lblSupLow} high={t.lblSupHigh} val={support}      setVal={setSupport} />
              <DimSlider label={t.dimRoleClarity} question={t.qRoleClarity} low={t.lblRCLow}  high={t.lblRCHigh}  val={roleClarity}  setVal={setRoleClarity} />
              <DimSlider label={t.dimPsychSafety} question={t.qPsychSafety} low={t.lblPSLow}  high={t.lblPSHigh}  val={psychSafety}  setVal={setPsychSafety} />
              <div className="md:col-span-2">
                <DimSlider label={t.dimGrowth}    question={t.qGrowth}      low={t.lblGLow}   high={t.lblGHigh}   val={growth}       setVal={setGrowth} />
              </div>
            </div>
          </div>
        </div>

        {/* ── RIGHT: DASHBOARD ── */}
        <div className="space-y-5">

          {/* Score Dashboard */}
          <div className="glass-hi p-5">
            <h2 className="text-base font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4">{t.scoreTitle}</h2>

            {/* Radar */}
            <div className="bg-slate-50/80 rounded-xl p-3 mb-4 border border-slate-100">
              <p className="text-[11px] font-semibold text-center text-slate-500 mb-1 uppercase tracking-wider">{t.chartTitle}</p>
              <RadarChart data={radarData} labels={t.chartLabels} />
            </div>

            {/* Score bars */}
            <div className="space-y-3">
              <ScoreBar value={mps} max={125} color="indigo" label={t.mpsLabel} sublabel={t.mpsFormula} />
              <ScoreBar value={engagementIndex} max={100} color="green" label={t.engLabel} sublabel={t.engDesc} />
              <ScoreBar value={burnoutRisk} max={100} color="red" label={t.burnLabel} sublabel={t.burnDesc} />
            </div>

            {/* JD-R Balance */}
            <div className="mt-4 pt-3 border-t border-slate-100">
              <p className="text-xs font-semibold text-slate-600 mb-2">{t.jdrLabel}</p>
              <JDRBar balance={jdrBalance} t={t} />
            </div>
          </div>

          {/* Diagnosis */}
          <div className="glass p-5">
            <h2 className="text-base font-bold text-slate-800 border-b border-slate-100 pb-2 mb-3">{t.diagTitle}</h2>

            {diagInfo && (
              <div className={`${diagClass} p-3 rounded-r-xl mb-3 fade-in`}>
                <p className="font-bold text-slate-800 text-sm">{diagInfo.title}</p>
                <p className="text-[13px] text-slate-600 mt-1 leading-relaxed">{diagInfo.desc}</p>
                <div className="mt-3 pt-2 border-t border-slate-200/60">
                  <p className="text-[11px] font-bold text-indigo-600">{t.researchSource}</p>
                  <a href={diagInfo.link} target="_blank" rel="noopener noreferrer"
                    className="rlink block text-[11px] text-indigo-600 hover:text-indigo-800 mt-1 bg-white/60 p-2 rounded leading-relaxed break-words">{diagInfo.research}</a>
                </div>
              </div>
            )}

            {/* Secondary flags */}
            {secondaryFlags.length > 0 && (
              <div className="bg-amber-50 border border-amber-100 rounded-xl p-2.5 mb-3">
                <p className="text-[11px] font-bold text-amber-700 mb-1">{t.secondaryFlags}</p>
                <div className="flex flex-wrap gap-1">
                  {secondaryFlags.map((f,i) => <span key={i} className="text-[10px] bg-amber-100 text-amber-800 rounded-full px-2 py-0.5 font-medium">{f}</span>)}
                </div>
              </div>
            )}

            {/* AI Coaching Button */}
            <button onClick={handleAiCoaching} disabled={aiState==='loading'}
              className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white text-sm font-semibold py-2.5 rounded-xl shadow-md disabled:opacity-60">
              {aiState==='loading' ? <><span className="pulse-dot"><span/><span/><span/></span><span>{t.aiLoading}</span></> : <><SparkleIcon/>{t.aiBtn}</>}
            </button>

            {/* AI Panel */}
            {aiState==='done' && aiText && (
              <div className="ai-gradient rounded-xl p-4 mt-3 fade-in">
                <p className="text-xs font-bold text-indigo-700 mb-2 flex items-center gap-1"><SparkleIcon/>{t.aiTitle}</p>
                <div className="text-[13px] leading-relaxed">{renderMarkdown(aiText)}</div>
                <p className="text-[10px] text-slate-400 mt-3 pt-2 border-t border-indigo-100">{t.aiDisclaimer}</p>
              </div>
            )}
            {aiState==='error' && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-3 mt-3 text-sm text-red-700">{t.aiError}</div>
            )}
          </div>

          {/* Action Plan */}
          {requiresActionPlan && (
            <div className="glass border-2 border-indigo-100 p-5">
              <h2 className="text-base font-bold text-slate-800 border-b border-slate-100 pb-2 mb-3">{t.actionTitle}</h2>
              <div className="space-y-3">
                <div>
                  <label className="text-xs font-semibold text-slate-700 block mb-1">{t.newTaskLbl}</label>
                  <textarea rows="2" value={newTask} onChange={e=>setNewTask(e.target.value)}
                    className="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200 resize-none" />
                </div>
                <div className="bg-indigo-50/60 border border-indigo-100 rounded-xl p-3">
                  <p className="text-xs font-bold text-indigo-900 mb-0.5">{t.recogLbl}</p>
                  <p className="text-[11px] text-indigo-600 mb-2">{t.recogDesc}</p>
                  <div className="grid grid-cols-2 gap-1.5 mb-2">
                    {[['kpi',t.chkKpi],['public',t.chkPublic],['bonus',t.chkBonus],['career',t.chkCareer]].map(([k,label])=>(
                      <label key={k} className="flex items-center gap-1.5 text-xs font-medium text-slate-700 cursor-pointer">
                        <input type="checkbox" name={k} checked={recog[k]} onChange={e=>setRecog({...recog,[k]:e.target.checked})}
                          className="w-3.5 h-3.5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-400 cursor-pointer"/>
                        {label}
                      </label>
                    ))}
                  </div>
                  <input type="text" value={recogOther} onChange={e=>setRecogOther(e.target.value)} placeholder={t.recogOtherPlaceholder}
                    className="w-full border border-slate-200 rounded-lg p-2 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-300" />
                </div>
                <div>
                  <label className="text-xs font-semibold text-slate-700 block mb-1">{t.notesLbl}</label>
                  <textarea rows="2" value={notes} onChange={e=>setNotes(e.target.value)} placeholder={t.notesPlaceholder}
                    className="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200 resize-none" />
                </div>
                <button onClick={handleSave} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 rounded-xl shadow-md flex items-center justify-center gap-2">
                  {savedNotify ? <><CheckIcon/>{t.btnSaved}</> : t.btnSave}
                </button>
              </div>
            </div>
          )}
          {!requiresActionPlan && (
            <div className="space-y-3">
              <div>
                <label className="text-xs font-semibold text-slate-700 block mb-1">{t.notesLbl}</label>
                <textarea rows="2" value={notes} onChange={e=>setNotes(e.target.value)} placeholder={t.notesPlaceholder}
                  className="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200 resize-none" />
              </div>
              <button onClick={handleSave} className="w-full bg-slate-700 hover:bg-slate-800 text-white font-semibold py-2.5 rounded-xl shadow-md flex items-center justify-center gap-2">
                {savedNotify ? <><CheckIcon/>{t.btnSaved}</> : t.btnSave}
              </button>
            </div>
          )}
        </div>
      </div>

      {/* ── TREND & HISTORY ── */}
      <div className="mt-8 glass p-5">
        <h2 className="text-base font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4">{t.historyTitle}</h2>

        {history.length > 0 && (
          <>
            {/* Trend selector */}
            <div className="mb-4">
              <p className="text-xs font-semibold text-slate-600 mb-2">{t.trendTitle} — {t.trendSelect}</p>
              <div className="flex flex-wrap gap-2">
                {uniqueNames.map(n=>(
                  <button key={n} onClick={()=>setTrendName(prev=>prev===n?'':n)}
                    className={`px-3 py-1 rounded-full text-xs font-semibold border ${trendName===n?'bg-indigo-600 text-white border-indigo-600':'bg-white text-slate-600 border-slate-200 hover:border-indigo-300'}`}>
                    {n}
                  </button>
                ))}
              </div>
              {trendName && (
                <div className="mt-3 bg-slate-50 rounded-xl p-4 border border-slate-100">
                  <TrendChart entries={trendEntries} lang={lang} />
                </div>
              )}
            </div>


            {/* History table */}
            <div className="flex justify-end mb-2 gap-2">
              <button onClick={exportExcel} className="text-xs font-semibold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 px-3 py-1 rounded-full flex items-center gap-1 transition-colors">
                📊 {lang === 'id' ? 'Export ke Excel' : 'Export to Excel'}
              </button>
              <button onClick={clearHistory} className="text-xs text-rose-500 bg-rose-50 hover:bg-rose-100 px-3 py-1 rounded-full border border-rose-100">
                {t.clearHistory}
              </button>
            </div>

            <div className="overflow-x-auto rounded-xl border border-slate-100">
              <table className="min-w-full text-sm">
                <thead className="bg-slate-50 text-slate-500">
                  <tr>
                    <th className="p-2.5 text-left">{t.thName}</th>
                    <th className="p-2.5 text-center">{t.thDate}</th>
                    <th className="p-2.5 text-center">{t.thMps}</th>
                    <th className="p-2.5 text-center">{t.thEng}</th>
                    <th className="p-2.5 text-center">{t.thBurn}</th>
                    <th className="p-2.5 text-center">{t.thDiag}</th>
                    <th className="p-2.5 text-left">{t.thNewTask}</th>
                    <th className="p-2.5 text-left">{t.thRecog}</th>
                    <th className="p-2.5 text-center">AI</th>
                  </tr>
                </thead>
                <tbody>
               {history.map(e => (
                 <React.Fragment key={e.id}>
                   <tr className="border-t border-slate-100 hover:bg-indigo-50/30">
                     <td className="p-2.5 font-semibold text-slate-800 whitespace-nowrap">{e.name}</td>
                     <td className="p-2.5 text-xs text-slate-400 text-center whitespace-nowrap">{e.date.split(',')[0]}</td>
                     <td className="p-2.5 text-center"><span className="mono font-bold text-indigo-600 text-sm">{e.mps}</span></td>
                     <td className="p-2.5 text-center"><span className="mono text-xs text-emerald-600 font-semibold">{e.engagementIndex||'—'}</span></td>
                     <td className="p-2.5 text-center"><span className="mono text-xs text-rose-500 font-semibold">{e.burnoutRisk||'—'}</span></td>
                     <td className="p-2.5 text-center text-base" title={e.diagnosis}>{diagEmoji(e.diagnosis)}</td>
                     <td className="p-2.5 text-xs text-slate-500 max-w-[120px] truncate">{e.newTask||'—'}</td>
                     <td className="p-2.5 text-xs text-slate-500 max-w-[160px] truncate">{e.recognition||'—'}</td>
                     {/* Tombol Dropdown AI */}
                     <td className="p-2.5 text-center">
                       {e.aiAnalysis ? (
                         <button 
                           onClick={() => setExpandedRow(prev => prev === e.id ? null : e.id)} 
                           className={`text-[10px] font-bold px-2 py-1 rounded transition-colors ${expandedRow === e.id ? 'bg-indigo-600 text-white' : 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200'}`}
                         >
                           {expandedRow === e.id ? 'Tutup' : 'Lihat'}
                         </button>
                       ) : (
                         <span className="text-[10px] text-slate-400">—</span>
                       )}
                     </td>
                   </tr>

                   {/* Baris Expandable untuk menampilkan teks AI */}
                   {expandedRow === e.id && e.aiAnalysis && (
                     <tr className="bg-indigo-50/50 border-b border-indigo-100">
                       <td colSpan="9" className="p-4">
                         <div className="bg-white rounded-xl p-4 border border-indigo-100 shadow-sm fade-in">
                           <p className="text-xs font-bold text-indigo-800 mb-3 flex items-center gap-1">
                             <SparkleIcon /> Analisis AI untuk {e.name}:
                           </p>
                           <div className="text-[13px] leading-relaxed">
                             {renderMarkdown(e.aiAnalysis)}
                           </div>
                         </div>
                       </td>
                     </tr>
                   )}
                 </React.Fragment>
               ))}
             </tbody>
              </table>
            </div>
          </>
        )}
        {history.length === 0 && (
          <p className="text-center text-slate-400 py-8 text-sm">{t.noHistory}</p>
        )}
      </div>

      {/* Footer */}
      <div className="mt-6 text-center text-[11px] text-slate-400 pb-6">
        Leader's Compass V3 · Based on JCM (Hackman & Oldham, 1976), JD-R (Bakker & Demerouti, 2007),
        Psych. Safety (Edmondson, 1999), Role Clarity (Rizzo et al., 1970), SDT (Ryan & Deci, 2000),
        UWES (Schaufeli et al., 2002) · Data stored locally, never transmitted.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
